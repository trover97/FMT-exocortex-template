name: Notify Template Update

# Ежедневно в 7:28 MSK (4:28 UTC) проверяет коммиты за 24ч
# и отправляет дайджест подписчикам через webhook бота @aist_me_bot.
# Также можно запустить вручную для тестирования.

on:
  schedule:
    - cron: '28 4 * * *'  # 7:28 MSK
  workflow_dispatch:       # ручной запуск для тестирования

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужна полная история для git log

      - name: Check for recent commits
        id: check
        run: |
          COMMITS=$(git log --since="24 hours ago" --oneline 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24 hours"
          else
            COMMIT_COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
            echo "$COMMIT_COUNT commits found"
          fi

      - name: Extract changelog entries for recent dates
        if: steps.check.outputs.has_changes == 'true'
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "entry=Нет CHANGELOG.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Собираем ВСЕ версии за последние 24ч (сегодня + вчера)
          TODAY=$(date -u +%Y-%m-%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)

          # Первая (самая новая) версия — для заголовка
          VERSION=$(grep -m1 '^## \[' CHANGELOG.md | sed 's/## //')

          # Все записи с датами today или yesterday
          # Собираем все блоки между ## [...] заголовками, фильтруя по дате
          python3 -c "
          import sys
          today = '$TODAY'
          yesterday = '$YESTERDAY'
          entries = []
          current_block = []
          current_date = None
          with open('CHANGELOG.md') as f:
              for line in f:
                  if line.startswith('## ['):
                      if current_block and current_date in (today, yesterday):
                          entries.extend(current_block)
                      current_block = []
                      # Extract date from '## [0.8.7] — 2026-03-17'
                      parts = line.split('—')
                      current_date = parts[-1].strip() if len(parts) > 1 else ''
                  elif current_date is not None:
                      current_block.append(line)
              # Last block
              if current_block and current_date in (today, yesterday):
                  entries.extend(current_block)
          result = ''.join(entries).strip()
          # Limit to ~50 lines
          lines = result.split('\n')[:50]
          print('\n'.join(lines))
          " > /tmp/changelog_entry.txt

          echo "$VERSION" > /tmp/changelog_version.txt

          # Проверяем, есть ли содержательные записи changelog за эти даты
          # Пустой файл или только пробелы/переводы строк = нет changelog
          if [ ! -s /tmp/changelog_entry.txt ]; then
            echo "No changelog entries for $TODAY or $YESTERDAY — skipping notification"
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
          else
            # Проверяем, что changelog содержит хотя бы один буллет-пункт (- или *)
            # Без этого changelog может содержать только заголовки секций без пунктов
            if ! grep -qE '^\s*[-*]' /tmp/changelog_entry.txt; then
              echo "Changelog has no substantive entries (no bullet points) — skipping"
              echo "has_changelog=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_changelog=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check significance of changes
        if: steps.check.outputs.has_changes == 'true' && steps.changelog.outputs.has_changelog == 'true'
        id: significance
        run: |
          # Проверяем, есть ли значимые изменения для пользователей
          # Незначительные: только CLAUDE.md, memory/, .claude/rules/, version bump, typo fix
          # Значимые: скиллы, роли, протоколы, install/update, docs, новые файлы

          CHANGELOG=$(cat /tmp/changelog_entry.txt)

          # Список файлов, изменённых за 24ч
          CHANGED_FILES=$(git log --since="24 hours ago" --name-only --pretty=format: | sort -u | grep -v '^$')

          # Паттерны значимых изменений (в changelog-тексте)
          SIGNIFICANT_PATTERNS="skill|роль|протокол|Added|Добавлено|install|update\.sh|setup|SETUP-GUIDE|LEARNING-PATH|скилл|новый|new"

          # Паттерны значимых файлов
          SIGNIFICANT_FILES="\.sh$|skills/|roles/|docs/|install|setup|synchronizer/"

          # Проверяем changelog на значимые ключевые слова
          if echo "$CHANGELOG" | grep -qiE "$SIGNIFICANT_PATTERNS"; then
            echo "is_significant=true" >> "$GITHUB_OUTPUT"
            echo "Significant: changelog contains notable changes"
            exit 0
          fi

          # Проверяем изменённые файлы на значимые паттерны
          if echo "$CHANGED_FILES" | grep -qE "$SIGNIFICANT_FILES"; then
            echo "is_significant=true" >> "$GITHUB_OUTPUT"
            echo "Significant: changed files include user-facing components"
            exit 0
          fi

          # Считаем буллет-пункты в changelog — если ≥3, считаем значимым (накопительный эффект)
          BULLET_COUNT=$(grep -cE '^\s*[-*]' /tmp/changelog_entry.txt || true)
          if [ "$BULLET_COUNT" -ge 3 ]; then
            echo "is_significant=true" >> "$GITHUB_OUTPUT"
            echo "Significant: $BULLET_COUNT changelog entries (cumulative)"
            exit 0
          fi

          echo "is_significant=false" >> "$GITHUB_OUTPUT"
          echo "Not significant: only minor/internal changes ($BULLET_COUNT entries, no significant patterns)"

      - name: Send notification via bot webhook
        if: steps.check.outputs.has_changes == 'true' && steps.changelog.outputs.has_changelog == 'true' && steps.significance.outputs.is_significant == 'true'
        env:
          BOT_WEBHOOK_URL: ${{ secrets.BOT_WEBHOOK_URL }}
          TEMPLATE_WEBHOOK_SECRET: ${{ secrets.TEMPLATE_WEBHOOK_SECRET }}
        run: |
          VERSION=$(cat /tmp/changelog_version.txt)
          ENTRY=$(cat /tmp/changelog_entry.txt)
          COMMIT_COUNT="${{ steps.check.outputs.commit_count }}"

          # Send to bot webhook (bot broadcasts to subscribers)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${BOT_WEBHOOK_URL}/api/template-update" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${TEMPLATE_WEBHOOK_SECRET}" \
            -d "$(jq -n \
              --arg version "$VERSION" \
              --arg changelog "$ENTRY" \
              --arg commit_count "$COMMIT_COUNT" \
              '{version: $version, changelog: $changelog, commit_count: ($commit_count | tonumber)}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Bot webhook responded: $BODY"
          else
            echo "✗ Bot webhook failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
