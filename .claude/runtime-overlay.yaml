# Runtime Overlay Registry — архитектура F (Generated runtime, WP-273 Этап 2)
#
# Source-of-truth: настоящий файл в FMT-exocortex-template (immutable).
# Output: $WORKSPACE_DIR/.iwe-runtime/ — пересоздаётся build-runtime.sh idempotent'но.
#
# КОНТРАКТ:
#   1. FMT остаётся clean upstream (git pull-able, никаких substituted значений).
#   2. .exocortex.env = единственный source пользовательских значений.
#   3. .iwe-runtime/ regenerable: удалили → setup.sh / update.sh / build-runtime.sh
#      воссоздадут identical, без потери данных.
#
# Когда добавлять файл сюда:
#   - В файле есть хотя бы один {{PLACEHOLDER}} ИЛИ
#   - Файл должен жить в $WORKSPACE_DIR/, а не в FMT (BUG-1 class).
#
# Когда НЕ добавлять:
#   - Read-only код (skills, hooks, lib, scripts/*.sh без плейсхолдеров) — читается из FMT
#     через $IWE_TEMPLATE / $IWE_SCRIPTS.
#   - Документация (README.md, *.md в docs/, prompts/) — read-only из FMT.

version: 1

# === SUBSTITUTED: FMT → .iwe-runtime/<path> с подстановкой плейсхолдеров ===
# Запускаемые файлы и launchd-плисты, которым нужны абсолютные пути.
substituted:
  # Strategist (стратегические сессии, планирование)
  - roles/strategist/scripts/launchd/com.strategist.morning.plist
  - roles/strategist/scripts/launchd/com.strategist.weekreview.plist
  - roles/strategist/scripts/strategist.sh

  # Extractor (извлечение знаний)
  - roles/extractor/scripts/launchd/com.extractor.inbox-check.plist
  - roles/extractor/scripts/extractor.sh
  - roles/extractor/config/routing.md

  # Synchronizer (фоновая синхронизация, scheduler)
  - roles/synchronizer/scripts/launchd/com.exocortex.scheduler.plist
  - roles/synchronizer/scripts/scheduler.sh
  - roles/synchronizer/scripts/code-scan.sh
  - roles/synchronizer/scripts/daily-report.sh
  - roles/synchronizer/scripts/dt-collect.sh
  - roles/synchronizer/scripts/video-scan.sh
  - roles/synchronizer/scripts/templates/extractor.sh
  - roles/synchronizer/scripts/templates/strategist.sh
  - roles/synchronizer/scripts/templates/synchronizer.sh
  - roles/synchronizer/config.yaml

# === COPIED_TO_WORKSPACE: FMT → $WORKSPACE_DIR/<path> (без substitution) ===
# Файлы, которые скрипты ищут в $WORKSPACE_DIR/ (BUG-1 fix). Без substitution
# просто копируются. При update.sh — переcопируются если изменились в FMT.
copied_to_workspace:
  - .claude/sync-manifest.yaml
  - params.yaml

# === COPIED_SUBSTITUTED: FMT → $WORKSPACE_DIR/<path> с substitution ===
# Файлы, которые должны быть в $WORKSPACE_DIR/ С подставленными плейсхолдерами.
# CLAUDE.md имеет особую логику (3-way merge), не идёт через build-runtime.
copied_substituted:
  # CLAUDE.md обрабатывается отдельно через 3-way merge в setup.sh / update.sh,
  # НЕ через build-runtime.sh. Сохранение USER-SPACE / merge-conflicts критично.

# === PLACEHOLDERS: ключи, читаемые из .exocortex.env ===
# Все значения берутся из $WORKSPACE_DIR/.exocortex.env (после WP-273 Ф19,
# раньше — из $TEMPLATE_DIR/.exocortex.env, миграция при первом build).
placeholders:
  - HOME_DIR
  - WORKSPACE_DIR
  - CLAUDE_PATH
  - CLAUDE_PROJECT_SLUG
  - TIMEZONE_HOUR
  - TIMEZONE_DESC
  - GITHUB_USER
  - GOVERNANCE_REPO
  - IWE_TEMPLATE      # путь к FMT (read-only upstream)
  - IWE_RUNTIME       # путь к $WORKSPACE_DIR/.iwe-runtime/ (writable substituted)

# === Runtime layout (что появляется в $WORKSPACE_DIR/ после build-runtime.sh) ===
#
# $WORKSPACE_DIR/
#   ├── .exocortex.env                            ← user state (writable)
#   ├── .iwe-runtime/                             ← derived (regenerable)
#   │   ├── .build-hash                           ← stamp для drift detection
#   │   ├── .build-version                        ← FMT version + overlay version
#   │   ├── roles/strategist/scripts/...
#   │   ├── roles/extractor/scripts/...
#   │   └── roles/synchronizer/...
#   ├── .claude/sync-manifest.yaml                ← copied (не substituted)
#   ├── params.yaml                               ← copied (не substituted)
#   ├── CLAUDE.md                                 ← 3-way merge (отдельная логика)
#   └── ... (governance repos, личные репо)
