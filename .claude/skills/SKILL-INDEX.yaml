# Skill Index — Browser IWE Suggestion Loop
# Maps keywords/tags to skill names for auto-suggestion in browser sessions.
# Suggestion rule: propose exactly ONE skill per response, most specific match wins.
# Only skills with browser: true are suggested in browser context.

skills:
  - name: day-open
    browser: false
    keywords: ["day open", "открытие дня", "утро", "план на день", "day plan"]
    description: "Morning planning ritual: gather context, set priorities, create DayPlan. Requires local FS."

  - name: day-close
    browser: false
