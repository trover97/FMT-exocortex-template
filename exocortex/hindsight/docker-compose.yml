version: "3.8"

services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: iwe-hindsight
    ports:
      - "8888:8888"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HINDSIGHT_PORT=8888
    volumes:
      - hindsight-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hindsight-data:
